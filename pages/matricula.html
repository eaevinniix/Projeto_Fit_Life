    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <nav class="navbar bg-dark navbar-dark navbar-expand-sm">
        <div class="container">
            <img src="/img/Logo-fit-life-pequena.png" alt="">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuNavbar">
                <div class="navbar-nav me-auto">
                    <a href="../index.html" class="nav-link active">Principal</a>
                    <div class="dropdown">
                        <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Produtos</a>
                        <ul class="dropdown-menu">
                           <li><a href="/pages/loja-suplemento.html#MaisVendidos" class="dropdown-item">Os mais vendidos</a></li>
                            <li><a href="/pages/loja-suplemento.html#WheyProtein" class="dropdown-item">Whey protein</a></li>
                            <li><a href="/pages/loja-suplemento.html#Creatina" class="dropdown-item">Creatina</a></li>
                            <li><a href="/pages/loja-suplemento.html#PreTreino" class="dropdown-item">Pré treino</a></li>
                            <li><a href="/pages/loja-suplemento.html#Roupas" class="dropdown-item">Roupas</a></li>
                            <li><a href="/pages/loja-suplemento.html#Acessorios" class="dropdown-item">Acessórios</a></li>
                            <li><a href="/pages/loja-suplemento.html#Tenis" class="dropdown-item">Tênis</a></li>
                        </ul>
                    </div>
                    <a href="/pages/listagem.html" class="nav-link">Lista</a>
                    <a href="/pages/dashboard.html" class="nav-link">Dashboard</a>
                </div>
            </div>
            <form action="" class="d-flex">
                <div class="input-group">
                    <input type="search" class="form-control" placeholder="Buscar...">
                    <button type="submit" class="btn btn-outline-primary">Buscar</button>
                </div>
            </form>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <h2 class="text-center mb-4">
                    Ficha de Matrícula
                </h2>

                <form class="card p-4 shadow-sm">
                    
                    <h5 class="mb-3 text-primary">Dados Pessoais</h5>
                    
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" placeholder="Digite seu nome">
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">CPF</label>
                            <input type="text" class="form-control" placeholder="000.000.000-00">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data de Nascimento</label>
                            <input type="date" class="form-control">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">E-mail</label>
                            <input type="email" class="form-control" placeholder="seu@email.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telefone</label>
                            <input type="tel" class="form-control" placeholder="(00) 00000-0000">
                        </div>
                    </div>

                    <hr class="my-4">

                    <h5 class="mb-3 text-primary">Endereço</h5>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">CEP</label>
                            <input type="text" class="form-control" placeholder="00000-000">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Rua</label>
                            <input type="text" class="form-control">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Número</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Bairro</label>
                            <input type="text" class="form-control">
                        </div>
                            <div class="col-4">
                                <label for="" class="form-label">Cidade</label>
                                    <select class="form-select">
                                        <option value="Rio Branco">Rio Branco</option>
                                        <option value="Maceió">Maceió</option>
                                        <option value="Manaus">Manaus</option>
                                        <option value="Salvador">Salvador</option>
                                        <option value="Fortaleza">Fortaleza</option>
                                        <option value="Brasília">Brasília</option>
                                        <option value="Vitória">Vitória</option>
                                        <option value="Goiânia">Goiânia</option>
                                        <option value="São Luís">São Luís</option>
                                        <option value="Cuiabá">Cuiabá</option>
                                        <option value="Campo Grande">Campo Grande</option>
                                        <option value="Belo Horizonte">Belo Horizonte</option>
                                        <option value="Belém">Belém</option>
                                        <option value="João Pessoa">João Pessoa</option>
                                        <option value="Curitiba">Curitiba</option>
                                        <option value="Recife">Recife</option>
                                        <option value="Teresina">Teresina</option>
                                        <option value="Rio de Janeiro">Rio de Janeiro</option>
                                        <option value="Natal">Natal</option>
                                        <option value="Porto Alegre">Porto Alegre</option>
                                    </select>
                                </div>
                            </div>

                    <hr class="my-4">

                    <h5 class="mb-3 text-primary">Plano</h5>
                    
                    <div class="mb-3">
                        <select class="form-select">
                            <option selected>Escolha seu plano...</option>
                            <option value="1">Básico - R$ 79,90/mês</option>
                            <option value="2">Intermediário - R$ 119,90/mês</option>
                            <option value="3">Premium - R$ 159,90/mês</option>
                        </select>
                    </div>

                    <hr class="my-4">

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="bi bi-check-circle"></i> Finalizar Matrícula
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-dark text-light text-center">
        Todos os direitos reservados
    </footer>

    <script src="/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
